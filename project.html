<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ana Bulović</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #EDEAE3;
      --surface: #E3E0D8;
      --border:  #CECAC4;
      --text:    #1A1714;
      --text2:   #5C5850;
      --text3:   #A09C96;
      --font-d:  'Syne', system-ui, sans-serif;
      --font-b:  'DM Sans', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-weight: 300;
      overflow-x: hidden;
      position: relative;
    }

    /* Warm radial gradient atmosphere */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 65% 55% at 92% 95%, rgba(192,154,106,0.10) 0%, transparent 58%),
        radial-gradient(ellipse 50% 40% at 5% 6%, rgba(232,224,210,0.28) 0%, transparent 52%);
    }

    /* Film grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      background-repeat: repeat;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: clamp(20px, 3vh, 40px) clamp(24px, 7vw, 110px);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg);
    }
    .nav-name { font-size: 11px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--text2); text-decoration: none; transition: color .25s ease; }
    .nav-name:hover { color: var(--text); }
    .nav-back { font-size: 11px; font-weight: 400; letter-spacing: .1em; color: var(--text2); text-decoration: none; transition: color .25s ease; display: flex; align-items: center; gap: 8px; }
    .nav-back:hover { color: var(--text); }
    .nav-back::before { content: '←'; font-size: 14px; }

    /* HERO */
    .p-hero {
      height: 70vh; min-height: 420px;
      position: relative; overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .p-hero-img {
      position: absolute; inset: 0;
    }
    .p-hero-img img {
      width: 100%; height: 100%; object-fit: cover; object-position: center center;
      filter: grayscale(50%) brightness(0.88);
      display: block;
    }
    .p-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,23,20,0.82) 0%, rgba(26,23,20,0.45) 35%, transparent 65%);
    }
    .p-hero-content {
      position: relative; z-index: 2;
      padding: 0 clamp(24px, 7vw, 110px) clamp(40px, 6vh, 72px);
      max-width: 800px;
    }
    .p-eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: .2em;
      text-transform: uppercase; color: rgba(240,236,228,0.55); margin-bottom: 16px;
    }
    .p-title {
      font-family: var(--font-d);
      font-size: clamp(38px, 6.5vw, 80px);
      font-weight: 800; line-height: .9;
      letter-spacing: -0.04em; color: #F0ECE4;
    }

    /* BODY */
    .p-body {
      padding: clamp(60px, 9vh, 100px) clamp(24px, 7vw, 110px);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: clamp(40px, 7vw, 100px);
    }
    @media (max-width: 720px) { .p-body { grid-template-columns: 1fr; } }

    .p-desc {
      font-family: var(--font-b);
      font-size: clamp(15px, 1.7vw, 20px);
      font-weight: 300; line-height: 1.78;
      color: var(--text2);
    }
    .p-desc em { font-style: italic; color: var(--text); }

    .p-meta { display: flex; flex-direction: column; gap: 28px; padding-top: 4px; }
    .p-meta-row {}
    .p-meta-label { font-size: 9.5px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; }
    .p-meta-value { font-size: 13.5px; font-weight: 300; color: var(--text2); line-height: 1.55; }
    .p-world-tag {
      display: inline-block; font-size: 9.5px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 1px; border: 1px solid;
      margin-right: 6px; margin-bottom: 6px;
    }
    .p-cat-tag {
      display: inline-block; font-size: 9.5px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 1px;
      border: 1px solid var(--text); color: var(--text);
      margin-right: 6px; margin-bottom: 6px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: clamp(28px, 4vh, 48px) clamp(24px, 7vw, 110px);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .footer-tagline { font-size: 11px; font-weight: 300; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); }
    .footer-mail { font-size: 12px; font-weight: 300; color: var(--text3); text-decoration: none; transition: color .25s ease; }
    .footer-mail:hover { color: var(--text); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<div class="grain" aria-hidden="true"></div>

<nav>
  <a class="nav-name" href="/">Ana Bulović</a>
  <a class="nav-back" href="/">All work</a>
</nav>

<section class="p-hero">
  <div class="p-hero-img"><img id="hero-img" src="https://placehold.co/1400x800/1a1714/1a1714" alt=""/></div>
  <div class="p-hero-overlay"></div>
  <div class="p-hero-content">
    <p class="p-eyebrow" id="p-type"></p>
    <h1 class="p-title" id="p-title"></h1>
  </div>
</section>

<div class="p-body">
  <p class="p-desc" id="p-desc"></p>
  <div class="p-meta" id="p-meta"></div>
</div>

<footer>
  <span class="footer-tagline">Performance · Sound · Research · Berlin</span>
  <a class="footer-mail" href="mailto:bulovic.ana@gmail.com">bulovic.ana@gmail.com</a>
</footer>

<script>
const worlds = {
  inner:  { label:'Inner Worlds',    color:'#A28EC8' },
  shared: { label:'Shared Worlds',   color:'#6FA09A' },
  built:  { label:'Felt Worlds',     color:'#BF7055' },
  living: { label:'Emergent Worlds', color:'#C09A6A' },
};

const projects = {
  'still-flow':    { title:'Still Flow',        type:'Movement Research — ongoing',
    thumb:'/brand_assets/Still-Flow.png',
    desc:`A movement method that grants access to a non-dual state of being. I developed the method through attempting to regain meaning in my dance practice, which seemed to me to be going more and more in aesthetic and decorative directions. Still Flow follows two principles: that of extreme slowness and that of non-intentionality. Followed for sufficiently long time, the mind enters a state of deep presence and flow, in which the usual sense of self and other, subject and object, inside and outside, begins to dissolve. I have been practicing Still Flow also as a method of inspiration for my artistic work, and some of what I condsider my best scenic ideas come directly from tapping into the Still Flow.`,
    worlds:['inner'], categories:['Research'], performances:[],
    partnerType:'Supported by', funding:['MIND Foundation'] },
  'method-singer': { title:'Method Singer',     type:'Vocal Research — Ongoing',
    thumb:'/brand_assets/Method-Singer.jpg',
    desc:`Befindlichkeit und Gestimmtheit is a practice-based research project on voice, inner state, and the field that opens between a singer and an audience.The project begins from a simple observation: a voice does not affect us only because of its sound, technique, or musical material. It carries the state of the person singing. Sometimes this state remains private; sometimes it reaches others with unusual force. I am interested in whether this difference can be perceived, trained, and worked with deliberately.Drawing on vocal practice, psychophysical theatre, contemplative state-work, ritual practice, and theories of listening, I am developing the framework of the Method Singer: a performer who treats their own state of being as artistic material. The Method Singer is not defined by a genre or vocal style, but by the ability to listen inwardly, enter and transform states, and use the voice to shape a shared relational space.The research asks three connected questions: Can a singer relate to their own voice in different ways? Can the relationship between singer and audience become an artistic material in itself? And how does a singer know what genuinely needs to be sung, beyond habit, technique, or performed conviction?At its centre is the possibility of communion: not as sentimentality, but as a precise performative condition in which voice, body, attention, material, and audience begin to belong to the same event.`,
    worlds:['inner'], categories:['Music','Research'], performances:[] },
  'sojourn':       { title:'Sojourn',           type:'Music Theatre',
    thumb:'/brand_assets/Sojourn.png', imgPosition:'center top',
    desc:`SojournSojourn is a 75-minute interdisciplinary performance told through movement, live music, masks, aerial imagery and symbolic visual worlds. My role in the work was composition, co-direction and performance.The piece follows a woman born on land who hears the call of the sea. She wants to escape the structures that shaped her — the logic of control, effort, self-direction and survival. But the sea does not ask her to conquer anything. It asks her to listen, to let go, and to enter a different relationship with power.At the centre of Sojourn is the balance between action and surrender. The protagonist's transformation does not come from becoming stronger in the usual sense. It comes from learning when to act, when to stop forcing, and when to allow herself to be moved by something larger than her own will.The work grew from my personal relationship to the coast: from growing up in Ploče, a post-industrial town in ex-Yugoslavia where concrete, abandoned military structures and harbour infrastructure stand beside the vastness of the Mediterranean Sea. This tension between built control and elemental life became one of the emotional sources of the piece.Sojourn was developed with my women-led art collective Not One Not Two and emerged from our bodily practice Navigating the Still Flow — a slow, unintentional movement practice in which images, emotions and archetypal figures are allowed to surface through the body.Rather than telling a linear story of overcoming, Sojourn follows a process of transformation: from resistance to listening, from control to relation, from the wish to master the world toward the wisdom of knowing when to surrender.`,
    worlds:['inner'], categories:['Music','Writing','Theatre'], performances:['Goethe Institut Berlin — 2024', 'HAU Hebbel am Ufer, Berlin — 2025'],
    partnerType:'Supported by', funding:['Goethe Institute', 'Bezirkskulturfonds Berlin'] },
  'arrivals':      { title:'Arrivals',          type:'Movement Research',
    thumb:'/brand_assets/arrivals.png',
    desc:`An experimental theatre of slowness, built from a single poetic text about secrets, birth, and what goes unnamed. Uses deliberate pacing as a method to shift the audience's perceptual state.`,
    worlds:['inner'], categories:['Theatre','Research'], performances:['Berlin Art Week, Uferstudios — Sep 2024'] },
  'frankenstein':  { title:'FrankenstAIn',      type:'Music Theatre',
    thumb:null,
    desc:`FrankenstAIn is a theatrical adaptation of Mary Shelley's Frankenstein, created with the inclusive ensemble DIE ECKIGEN. The production is a co-production between Kreisdiakonisches Werk Stralsund e.V., Theater Vorpommern and Stralsunder Werkstätten, directed by Franz Triebenecker, with choreography by Judith Tiedtke. Its experimental musical language is developed from the voices of DIE ECKIGEN under the musical direction of Friederike Gawenda and Ana Bulović. At the centre of the work is the voice: not primarily as a carrier of text, but as a body in space, a trace of identity, and a site of transformation. The performers' individual vocal qualities are not adapted to a pre-existing musical ideal; they become the material from which the composition grows.Through live voice modulation, spatial sound and 3D audio, the voices can appear close or distant, fragile or monumental, familiar or uncanny. A voice may return as its own double. A small vocal gesture may expand into a landscape. A fragment may become a creature.Shelley's novel offers a powerful frame for this sonic research: the creature is self-made and yet rejected, recognisable and yet treated as foreign. FrankenstAIn follows this tension through sound, exploring creation, fragmentation, doubling, isolation, longing, rage, vulnerability, and the strange intimacy between technology and the human voice.Technology is not used as decoration, but as a way of asking what transformation does to perception. How far can a voice be altered before it stops being heard as human? Can digital processing make the vulnerability of a voice more present rather than less? FrankenstAIn treats difference not as something to be smoothed out, but as the source of a new musical and theatrical language.`,
    worlds:['inner'], categories:['Music','Theatre','Research'], performances:['Theater Vorpommern, Greifswald — Oct 2026 (premiere)'],
    partnerType:'Supported by', funding:['Musikfonds e.V.', 'Berliner Senat'] },
  'dimensions':    { title:'Dimensions of an Art Piece', type:'Research framework — open to collaborators',
    thumb:'/brand_assets/Dimensions.png',
    desc:`A systematic framework for analyzing what an artwork actually does to a human being, drawing on the eight-circuit model of consciousness by Timothy Leary, Robert Wilson and Antero Alli. Being developed publicly — looking for people to think through it with.`,
    worlds:['shared'], categories:['Research','Writing'], performances:[],
    partnerType:'Brainstormed with', funding:['Anne-Lorraine Selke'] },
  'already':       { title:'Already Not Here',  type:'Sound Installation',
    thumb:'/brand_assets/already-not-here.png',
    desc:`An octophonic installation with eight simultaneous voices, each telling a story of a disappeared girl. The listener walks through the room, slowly building intimacy with someone who is no longer there.`,
    worlds:['shared'], categories:['Writing','Music'], performances:['Schreibhain, Berlin — 2026'],
    partnerType:'Supported by', funding:['Schreibhain writing scholarship'] },
  'proper-time':   { title:'Proper Time',       type:'Multi-room experience — Audience Award INSIGHT 2023',
    thumb:'/brand_assets/proper-time.png',
    desc:`An immersive multi-sensory installation asking whether personal time and physical time are the same thing. Spatial design, sound, and video are composed to dissolve the stability of your sense of causality.`,
    worlds:['built','shared'], categories:['Theatre','Research'], performances:['INSIGHT Festival, Berlin — 2023 (Audience Award)'],
    partnerType:'Funded by', funding:['MIND Foundation'] },
  'unsichtbar':    { title:'Unsichtbar',         type:'Sensory Theatre',
    thumb:null,
    desc:`A blindfolded, multi-sensory adaptation of The Little Prince for audiences of all ages. When vision is removed, touch, scent, and sound unlock dimensions of experience normally closed to us.`,
    worlds:['built'], categories:['Theatre'], performances:[],
    partnerType:'Funded by', funding:['KiA Berlin'] },
  'on-growth':     { title:'On Growth',         type:'Doctoral Thesis',
    thumb:null,
    desc:`Doctoral research in theoretical biophysics on how bacteria grow and adapt to their environment. A foundational study in how living systems generate organized complexity from simple principles.`,
    worlds:['living'], categories:['Science','Research'], performances:[],
    partnerType:'University', funding:['Humboldt University Berlin', 'INRAE France'] },
  'world-scores':  { title:'World Scores',      type:'Music for artificial societies',
    thumb:'/brand_assets/world-scores.png',
    desc:`A current research project writing "worlds" — conditions and constraints from which communities of AI agents compose music. What environment must you build for something alive to emerge?`,
    worlds:['living','shared'], categories:['Music','Research'], performances:[],
    partnerType:'Advised by', funding:['Ellie Hein', 'Joe Edelman'] },
};

const id = new URLSearchParams(window.location.search).get('id');
const p = projects[id];

if (!p) {
  document.getElementById('p-title').textContent = 'Project not found';
} else {
  document.title = `${p.title} — Ana Bulović`;
  document.getElementById('p-type').textContent = p.type;
  document.getElementById('p-title').textContent = p.title;
  document.getElementById('p-desc').innerHTML = p.desc;

  if (p.thumb) {
    const img = document.getElementById('hero-img');
    img.src = p.thumb;
    if (p.imgPosition) img.style.objectPosition = p.imgPosition;
  }

  const meta = document.getElementById('p-meta');

  if (p.worlds.length) {
    const tags = p.worlds.map(w => {
      const wd = worlds[w];
      return `<span class="p-world-tag" style="color:${wd.color};border-color:${wd.color}44">${wd.label}</span>`;
    }).join('');
    meta.innerHTML += `<div class="p-meta-row"><div class="p-meta-label">Research world</div><div>${tags}</div></div>`;
  }

  if (p.categories.length) {
    const catTags = p.categories.map(c => `<span class="p-cat-tag">${c}</span>`).join('');
    meta.innerHTML += `<div class="p-meta-row"><div class="p-meta-label">Category</div><div>${catTags}</div></div>`;
  }

  meta.innerHTML += `<div class="p-meta-row"><div class="p-meta-label">Type</div><div class="p-meta-value">${p.type}</div></div>`;

  if (p.performances && p.performances.length) {
    meta.innerHTML += `<div class="p-meta-row"><div class="p-meta-label">Performances</div><div class="p-meta-value">${p.performances.map(s => `<div style="margin-bottom:3px">— ${s}</div>`).join('')}</div></div>`;
  }

  if (p.funding && p.funding.length) {
    meta.innerHTML += `<div class="p-meta-row"><div class="p-meta-label">${p.partnerType || 'Supported by'}</div><div class="p-meta-value">${p.funding.join('<br>')}</div></div>`;
  }
}
</script>
</body>
</html>
