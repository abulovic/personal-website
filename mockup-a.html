<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>Mockup A – Bottom Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #090909; --surface: #111; --surface2: #181818;
    --border: #1C1C1C; --text: #F0EFEC; --text2: #7A7A76;
    --text3: #363636; --accent: #BF2318;
    --font-d: 'Syne', system-ui, sans-serif;
    --font-b: 'DM Sans', system-ui, sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-b);
    width: 375px;
    height: 812px;
    overflow: hidden;
    position: relative;
  }

  /* ── LABEL CHIP ── */
  .approach-label {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #222;
    border: 1px solid #333;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text2);
    padding: 5px 14px;
    z-index: 300;
    white-space: nowrap;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 48px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-eyebrow {
    font-size: 9px; font-weight: 500; letter-spacing: .22em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .section-title {
    font-family: var(--font-d);
    font-size: 20px; font-weight: 700; letter-spacing: -.02em;
    color: var(--text);
  }

  /* ── MAP AREA ── */
  .map-area {
    padding: 16px 12px;
    position: relative;
  }
  .map-svg-wrap {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* simplified map nodes */
  .map-placeholder {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .node {
    position: absolute;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .node-world {
    width: 38px; height: 38px;
  }
  .node-project {
    width: 22px; height: 22px;
  }
  .node-label {
    position: absolute;
    font-size: 7px;
    font-weight: 500;
    letter-spacing: .06em;
    white-space: nowrap;
    top: calc(100% + 4px);
    left: 50%; transform: translateX(-50%);
    color: var(--text2);
  }
  .node-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .node-project .node-dot { width: 4px; height: 4px; }

  .conn-line {
    position: absolute;
    background: #2a2a2a;
    transform-origin: left center;
  }

  /* world nodes */
  .w-inner  { color: #7BA7E0; top: 24%; left: 46%; }
  .w-shared { color: #C4956A; top: 55%; left: 62%; }
  .w-built  { color: #7BBF92; top: 62%; left: 28%; }
  .w-living { color: #A07BC4; top: 28%; left: 72%; }

  /* project nodes */
  .p1 { color: #555; top: 18%; left: 28%; }
  .p2 { color: #555; top: 38%; left: 18%; }
  .p3 { color: #555; top: 70%; left: 48%; }
  .p4 { color: #555; top: 42%; left: 52%; }
  .p5 { color: var(--accent); top: 34%; left: 36%; } /* selected */
  .p6 { color: #555; top: 52%; left: 76%; }
  .p7 { color: #555; top: 76%; left: 66%; }

  /* tap ripple on selected node */
  .tap-ring {
    position: absolute;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    top: 34%; left: 36%;
    transform: translate(-50%, -50%) translate(11px, 11px) scale(1.6);
    opacity: .35;
  }

  /* tap cursor icon */
  .tap-cursor {
    position: absolute;
    top: 34%; left: 36%;
    transform: translate(18px, 16px);
    font-size: 16px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.8));
    z-index: 10;
  }

  /* ── BOTTOM SHEET ── */
  .sheet-scrim {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
  }
  .bottom-sheet {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 150;
    background: var(--surface2);
    border-top: 1px solid #2a2a2a;
    border-radius: 10px 10px 0 0;
    padding-bottom: 20px;
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #333;
    border-radius: 2px;
    margin: 10px auto 0;
  }
  .sheet-img {
    width: 100%;
    height: 110px;
    object-fit: cover;
    display: block;
    filter: grayscale(1) contrast(1.08) brightness(.7);
    position: relative;
  }
  .sheet-img-wrap {
    position: relative;
    overflow: hidden;
  }
  .sheet-img-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(24,24,24,.95) 0%, transparent 60%);
  }
  .sheet-body {
    padding: 16px 20px 8px;
  }
  .sheet-eye {
    font-size: 8.5px; font-weight: 500; letter-spacing: .2em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .sheet-name {
    font-family: var(--font-d);
    font-size: 18px; font-weight: 700; letter-spacing: -.02em;
    color: var(--text); margin-bottom: 8px; line-height: 1.1;
  }
  .sheet-desc {
    font-size: 11px; font-weight: 300; line-height: 1.65;
    color: var(--text2); margin-bottom: 14px;
  }
  .sheet-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
  }
  .sheet-tag {
    font-size: 8.5px; font-weight: 500; letter-spacing: .1em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 1px; border: 1px solid;
  }
  .sheet-link {
    display: block; width: 100%;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: var(--text2);
    font-family: var(--font-b);
    font-size: 11px; font-weight: 500; letter-spacing: .12em;
    text-transform: uppercase;
    text-align: center;
    padding: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .2s, color .2s;
  }

  /* annotation arrows */
  .annotation {
    position: absolute;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .06em;
    color: #4a4a4a;
    white-space: nowrap;
  }
  .annotation-line {
    position: absolute;
    background: #2a2a2a;
  }
</style>
</head>
<body>

<div class="approach-label">A — Bottom Sheet</div>

<!-- Section header -->
<div class="section-header">
  <div class="section-eyebrow">Constellation</div>
  <div class="section-title">Projects & Worlds</div>
</div>

<!-- Map -->
<div class="map-area">
  <div class="map-svg-wrap">
    <div class="map-placeholder">
      <!-- connection lines (simplified) -->
      <div class="conn-line" style="width:52px;height:1px;top:40%;left:29%;transform:rotate(-18deg);opacity:.3"></div>
      <div class="conn-line" style="width:40px;height:1px;top:37%;left:37%;transform:rotate(8deg);opacity:.5;background:#BF2318"></div>
      <div class="conn-line" style="width:60px;height:1px;top:52%;left:42%;transform:rotate(22deg);opacity:.3"></div>
      <div class="conn-line" style="width:44px;height:1px;top:45%;left:56%;transform:rotate(-30deg);opacity:.3"></div>
      <div class="conn-line" style="width:55px;height:1px;top:60%;left:32%;transform:rotate(-8deg);opacity:.3"></div>

      <!-- world nodes -->
      <div class="node node-world w-inner">
        <div class="node-dot"></div>
        <span class="node-label">Inner</span>
      </div>
      <div class="node node-world w-shared">
        <div class="node-dot"></div>
        <span class="node-label">Shared</span>
      </div>
      <div class="node node-world w-built">
        <div class="node-dot"></div>
        <span class="node-label">Built</span>
      </div>
      <div class="node node-world w-living">
        <div class="node-dot"></div>
        <span class="node-label">Living</span>
      </div>

      <!-- project nodes -->
      <div class="node node-project p1"><div class="node-dot"></div></div>
      <div class="node node-project p2"><div class="node-dot"></div></div>
      <div class="node node-project p3"><div class="node-dot"></div></div>
      <div class="node node-project p4"><div class="node-dot"></div></div>
      <div class="node node-project p5" style="width:26px;height:26px">
        <div class="node-dot" style="width:5px;height:5px"></div>
      </div>
      <div class="node node-project p6"><div class="node-dot"></div></div>
      <div class="node node-project p7"><div class="node-dot"></div></div>

      <!-- tap indicator -->
      <div class="tap-ring"></div>
      <div class="tap-cursor">👆</div>
    </div>
  </div>
</div>

<!-- Scrim -->
<div class="sheet-scrim"></div>

<!-- Bottom Sheet -->
<div class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-img-wrap">
    <img class="sheet-img" src="https://placehold.co/375x110/111111/222222?text=." alt="">
  </div>
  <div class="sheet-body">
    <div class="sheet-eye">Performance · Research</div>
    <div class="sheet-name">The Method of the Singer</div>
    <div class="sheet-desc">An investigation into vocal embodiment and presence — how a performer's inner state becomes audible texture in the voice.</div>
    <div class="sheet-tags">
      <span class="sheet-tag" style="color:#7BA7E0;border-color:#7BA7E044">Inner</span>
      <span class="sheet-tag" style="color:#C4956A;border-color:#C4956A44">Shared</span>
    </div>
    <a class="sheet-link" href="#">View Project →</a>
  </div>
</div>

</body>
</html>
