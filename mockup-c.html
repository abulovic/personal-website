<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>Mockup C – List View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #090909; --surface: #111; --surface2: #181818;
    --border: #1C1C1C; --text: #F0EFEC; --text2: #7A7A76;
    --text3: #363636; --accent: #BF2318;
    --font-d: 'Syne', system-ui, sans-serif;
    --font-b: 'DM Sans', system-ui, sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-b);
    width: 375px;
    height: 812px;
    overflow: hidden;
    position: relative;
  }

  .approach-label {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: #222;
    border: 1px solid #333;
    border-radius: 20px;
    font-size: 10px; font-weight: 500; letter-spacing: .15em;
    text-transform: uppercase; color: var(--text2);
    padding: 5px 14px;
    z-index: 300;
    white-space: nowrap;
  }

  .section-header {
    padding: 48px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .section-header-left {}
  .section-eyebrow {
    font-size: 9px; font-weight: 500; letter-spacing: .22em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .section-title {
    font-family: var(--font-d);
    font-size: 20px; font-weight: 700; letter-spacing: -.02em; color: var(--text);
  }
  .map-toggle {
    font-size: 8.5px; font-weight: 500; letter-spacing: .15em;
    text-transform: uppercase; color: var(--text3);
    border: 1px solid #222;
    padding: 6px 10px; border-radius: 2px;
    display: flex; align-items: center; gap: 5px;
    cursor: pointer;
  }
  .map-icon { font-size: 10px; }

  /* world filter pills */
  .filter-row {
    display: flex; gap: 6px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-pill {
    font-size: 8.5px; font-weight: 500; letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid; white-space: nowrap; cursor: pointer;
    flex-shrink: 0;
  }
  .filter-pill.active { opacity: 1; }
  .filter-pill.inactive { opacity: .35; }

  /* world group */
  .world-group { border-bottom: 1px solid var(--border); }
  .world-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px;
    cursor: pointer;
  }
  .world-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .world-name {
    font-family: var(--font-d);
    font-size: 13px; font-weight: 700; letter-spacing: -.01em;
    flex: 1;
  }
  .world-count {
    font-size: 9px; letter-spacing: .1em; color: var(--text3);
  }
  .world-chevron { color: var(--text3); font-size: 10px; }

  /* project row */
  .project-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px 10px 38px;
    border-top: 1px solid #141414;
    cursor: pointer;
    text-decoration: none;
  }
  .project-thumb {
    width: 42px; height: 30px;
    border-radius: 1px;
    object-fit: cover;
    filter: grayscale(1) brightness(.7);
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .project-info { flex: 1; min-width: 0; }
  .project-name {
    font-size: 12px; font-weight: 500; letter-spacing: -.01em;
    color: var(--text); margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .project-type {
    font-size: 9px; font-weight: 400; color: var(--text3);
    letter-spacing: .05em;
  }
  .project-arrow { color: var(--text3); font-size: 10px; }

  /* collapsed group shows dimmed, no rows */
  .world-group.collapsed .project-row { display: none; }

  /* fade at bottom */
  .fade-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to top, var(--bg), transparent);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="approach-label">C — List / No Map on Mobile</div>

<div class="section-header">
  <div class="section-header-left">
    <div class="section-eyebrow">Constellation</div>
    <div class="section-title">Projects & Worlds</div>
  </div>
  <div class="map-toggle">
    <span class="map-icon">⊹</span> Map
  </div>
</div>

<!-- world filter pills -->
<div class="filter-row">
  <div class="filter-pill active" style="color:#F0EFEC;border-color:#2a2a2a">All</div>
  <div class="filter-pill active" style="color:#7BA7E0;border-color:#7BA7E066">Inner</div>
  <div class="filter-pill inactive" style="color:#C4956A;border-color:#C4956A66">Shared</div>
  <div class="filter-pill inactive" style="color:#7BBF92;border-color:#7BBF9266">Built</div>
  <div class="filter-pill inactive" style="color:#A07BC4;border-color:#A07BC466">Living</div>
</div>

<!-- Inner world (expanded) -->
<div class="world-group">
  <div class="world-header">
    <div class="world-dot" style="background:#7BA7E0"></div>
    <div class="world-name" style="color:#7BA7E0">Inner</div>
    <div class="world-count">4 projects</div>
    <div class="world-chevron">▾</div>
  </div>
  <a class="project-row" href="#">
    <img class="project-thumb" src="https://placehold.co/42x30/111/222?text=." alt="">
    <div class="project-info">
      <div class="project-name">The Method of the Singer</div>
      <div class="project-type">Performance · Research</div>
    </div>
    <div class="project-arrow">›</div>
  </a>
  <a class="project-row" href="#">
    <img class="project-thumb" src="https://placehold.co/42x30/111/222?text=." alt="">
    <div class="project-info">
      <div class="project-name">Sojourn</div>
      <div class="project-type">Music · Writing</div>
    </div>
    <div class="project-arrow">›</div>
  </a>
  <a class="project-row" href="#">
    <img class="project-thumb" src="https://placehold.co/42x30/111/222?text=." alt="">
    <div class="project-info">
      <div class="project-name">Still Flow</div>
      <div class="project-type">Research</div>
    </div>
    <div class="project-arrow">›</div>
  </a>
</div>

<!-- Shared world (collapsed) -->
<div class="world-group collapsed">
  <div class="world-header">
    <div class="world-dot" style="background:#C4956A"></div>
    <div class="world-name" style="color:#C4956A">Shared</div>
    <div class="world-count">5 projects</div>
    <div class="world-chevron" style="transform:rotate(-90deg)">▾</div>
  </div>
</div>

<!-- Built world (collapsed) -->
<div class="world-group collapsed">
  <div class="world-header">
    <div class="world-dot" style="background:#7BBF92"></div>
    <div class="world-name" style="color:#7BBF92">Built</div>
    <div class="world-count">3 projects</div>
    <div class="world-chevron" style="transform:rotate(-90deg)">▾</div>
  </div>
</div>

<!-- Living world (collapsed) -->
<div class="world-group collapsed">
  <div class="world-header">
    <div class="world-dot" style="background:#A07BC4"></div>
    <div class="world-name" style="color:#A07BC4">Living</div>
    <div class="world-count">4 projects</div>
    <div class="world-chevron" style="transform:rotate(-90deg)">▾</div>
  </div>
</div>

<div class="fade-bottom"></div>

</body>
</html>
