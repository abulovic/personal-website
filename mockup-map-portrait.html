<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>Mobile Map — Portrait Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #090909; --surface: #111; --surface2: #181818;
    --border: #1C1C1C; --text: #F0EFEC; --text2: #7A7A76;
    --text3: #363636; --accent: #BF2318;
    --font-d: 'Syne', system-ui, sans-serif;
    --font-b: 'DM Sans', system-ui, sans-serif;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-b);
    width: 375px;
  }

  .const-section {
    padding: 0;
  }

  .const-header {
    padding: 32px 22px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .const-eyebrow {
    font-size: 9px; font-weight: 500; letter-spacing: .22em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .const-title {
    font-family: var(--font-d);
    font-size: 20px; font-weight: 700; letter-spacing: -.02em;
    color: var(--text); line-height: 1.1;
  }
  .const-hint {
    font-size: 9px; letter-spacing: .05em; color: var(--text3);
    text-align: right; line-height: 1.5;
  }

  .map-wrap {
    width: 100%;
    overflow: hidden;
  }

  #map-mobile {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  .w-node, .p-node { cursor: pointer; }
  .w-ring {
    fill: none;
    transform-box: fill-box;
    transform-origin: center;
  }
  @keyframes breathe { 0%,100%{opacity:.18;transform:scale(1)} 55%{opacity:.07;transform:scale(1.12)} }
  .ring-inner  { animation: breathe 5.2s ease-in-out infinite; }
  .ring-shared { animation: breathe 6.1s ease-in-out infinite 1.3s; }
  .ring-built  { animation: breathe 5.7s ease-in-out infinite 0.7s; }
  .ring-living { animation: breathe 6.5s ease-in-out infinite 2.1s; }
</style>
</head>
<body>

<section class="const-section">
  <div class="const-header">
    <div>
      <div class="const-eyebrow">Constellation</div>
      <div class="const-title">Projects &<br>Worlds</div>
    </div>
    <div class="const-hint">tap any node<br>to explore</div>
  </div>

      Portrait viewBox: 0 0 360 740
      World positions (2x2 grid):
        inner  (100, 150)   shared (260, 150)
        built  (100, 510)   living (260, 510)

        sojourn        inner            (155, 308)
        arrivals       inner            (44, 185)

        dimensions     shared           (262, 270)
        already        shared           (322, 200)
        proper-time    built+shared     (178, 368)
        world-scores   living+shared    (318, 382)
        on-growth      living           (268, 428)
        unsichtbar     built            (40, 580)

          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="bw" color-interpolation-filters="sRGB">
          <feColorMatrix type="saturate" values="0"/>
          <feComponentTransfer>
            <feFuncR type="linear" slope="1.15" intercept="-0.07"/>
            <feFuncG type="linear" slope="1.15" intercept="-0.07"/>
            <feFuncB type="linear" slope="1.15" intercept="-0.07"/>

        <clipPath id="cp-og">  <circle cx="268" cy="428" r="16"/></clipPath>
        <clipPath id="cp-un">  <circle cx="40"  cy="580" r="16"/></clipPath>
      </defs>

      <line class="conn" data-w="inner"  data-p="method-singer" x1="100" y1="150" x2="96"  y2="275" stroke="#A28EC8" stroke-width=".7" stroke-opacity=".18"/>
